<!-- Contenedor principal con estructura de layout fijo -->
<div id="contenedor">
    <app-header></app-header>

    <main id="contenido">
        <!-- Nuevo componente de autenticación con el estilo original -->
        <div class="auth-section">
            <div class="nav-links">
                <a routerLink="/noticias">Noticias</a>
                <a routerLink="/ocio">Ocio</a>
                <a routerLink="/meteorologia">Meteorología</a>
            </div>
            <div class="auth-controls">
                <ng-container *ngIf="!authService.isLoggedIn()">
                    <button class="login-btn" routerLink="/login">Iniciar Sesión</button>
                    <button class="login-btn" routerLink="/register">Registrarse</button>
                </ng-container>
                <ng-container *ngIf="authService.isLoggedIn()">
                    <span>Bienvenido, {{ authService.getCurrentUser()?.username }}</span>
                    <button class="logout-btn" (click)="authService.logout()">Cerrar Sesión</button>
                </ng-container>
            </div>
        </div>

        <h2 class="titulo">Últimas noticias del mundo dron</h2>
        <app-noticias></app-noticias>

        <h2 class="titulo">Galería de vuelos</h2>
        <app-ocio></app-ocio>

        <h2 class="titulo">El tiempo esta semana en asturias</h2>
        <app-meteorologia></app-meteorologia>
    </main>

    <app-footer></app-footer>
</div>
